<!doctype html>
<html lang="uk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📢 Feedback | Destiny Code Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
        }

        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8">

    <!-- 🔐 LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
        <div class="card rounded-2xl p-8 w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold text-white mb-2">🔐 Feedback Admin</h2>
            <input type="password" id="password-input" placeholder="Введіть пароль"
                class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-600 text-white text-center text-lg tracking-widest mb-4 focus:outline-none focus:border-indigo-500"
                autofocus />
            <button id="login-btn"
                class="w-full px-4 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-semibold transition">
                Увійти
            </button>
        </div>
    </div>

    <!-- 📊 DASHBOARD -->
    <div id="admin-content" class="max-w-6xl mx-auto hidden pb-20">
        <div class="flex items-center justify-between mb-8">
            <div>
                <a href="/admin" class="text-indigo-400 hover:text-indigo-300 text-sm mb-1 inline-block">← Назад до
                    Меню</a>
                <h1 class="text-3xl font-bold text-white">📢 Website Feedback</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="loadFeedback()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">🔄
                    Refresh</button>
            </div>
        </div>

        <!-- STATS ROW -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <!-- Total -->
            <div class="card rounded-xl p-5 border-l-4 border-indigo-500">
                <div class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1">Всього (останні 100)</div>
                <div class="text-3xl font-bold text-white" id="stat-total">-</div>
            </div>
            <!-- Likes -->
            <div class="card rounded-xl p-5 border-l-4 border-green-500">
                <div class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1">👍 Позитив</div>
                <div class="text-3xl font-bold text-white" id="stat-likes">-</div>
            </div>
            <!-- Dislikes -->
            <div class="card rounded-xl p-5 border-l-4 border-red-500">
                <div class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1">👎 Негатив</div>
                <div class="text-3xl font-bold text-white" id="stat-dislikes">-</div>
            </div>
            <!-- Text Feedback -->
            <div class="card rounded-xl p-5 border-l-4 border-amber-500">
                <div class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1">💬 Текст</div>
                <div class="text-3xl font-bold text-white" id="stat-text">-</div>
            </div>
        </div>

        <!-- FILTERS -->
        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="filterFeed('all')" id="btn-all"
                class="filter-btn px-4 py-2 rounded-lg bg-indigo-600 text-white">Всі</button>
            <button onclick="filterFeed('text')" id="btn-text"
                class="filter-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300">📝 Текст</button>
            <button onclick="filterFeed('like')" id="btn-like"
                class="filter-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300">👍 Likes</button>
            <button onclick="filterFeed('dislike')" id="btn-dislike"
                class="filter-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300">👎 Dislikes</button>
        </div>

        <!-- LIST CONTAINER -->
        <div id="feedback-container" class="space-y-3">
            <div class="text-center py-20 text-slate-500">Завантаження...</div>
        </div>
    </div>

    <!-- FIREBASE SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            projectId: "destinycode-982fa",
            appId: "1:168629222416:web:3283f6a4051f57a85c9e95",
            storageBucket: "destinycode-982fa.firebasestorage.app",
            apiKey: "AIzaSyA20BvSogSuHTni09Y54HwmlpG7UKXuxk8",
            authDomain: "destinycode-982fa.firebaseapp.com",
            messagingSenderId: "168629222416",
            measurementId: "G-ZKS4RCNFGX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTH ---
        const ADMIN_PASSWORD = '1536';
        const SESSION_KEY = 'dc_admin_auth';

        document.getElementById('login-btn').addEventListener('click', attemptLogin);
        document.getElementById('password-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });

        async function attemptLogin() {
            const pass = document.getElementById('password-input').value;
            const btn = document.getElementById('login-btn');

            if (pass === ADMIN_PASSWORD) {
                try {
                    btn.disabled = true;
                    btn.innerText = 'Вхід...';

                    // 🔥 SECURITY UPGRADE: Sign in to Firebase to satisfy Firestore rules
                    await signInAnonymously(auth);

                    sessionStorage.setItem(SESSION_KEY, 'true');
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('admin-content').classList.remove('hidden');
                    loadFeedback();
                } catch (e) {
                    alert('Помилка авторизації Firebase: ' + e.message);
                    console.error(e);
                } finally {
                    btn.disabled = false;
                    btn.innerText = 'Увійти';
                }
            } else {
                alert('Невірний пароль');
            }
        }

        // --- DATA LOGIC ---
        let allItems = [];
        let currentFilter = 'all';

        window.filterFeed = (type) => {
            currentFilter = type;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('bg-slate-700', 'text-slate-300');
            });
            const activeBtn = document.getElementById(`btn-${type}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-slate-700', 'text-slate-300');
                activeBtn.classList.add('bg-indigo-600', 'text-white');
            }

            renderList();
        };

        window.loadFeedback = async () => {
            const container = document.getElementById('feedback-container');
            container.innerHTML = '<div class="text-center py-20 text-slate-500 animate-pulse">Оновлення даних...</div>';

            try {
                // Fetch last 100 items
                const q = query(collection(db, "web_feedback"), orderBy("timestamp", "desc"), limit(100));
                const snapshot = await getDocs(q);

                allItems = [];
                let stats = { total: 0, like: 0, dislike: 0, text: 0 };

                snapshot.forEach(doc => {
                    const data = doc.data();
                    allItems.push({ id: doc.id, ...data });

                    stats.total++;
                    if (data.type === 'like') stats.like++;
                    if (data.type === 'dislike') stats.dislike++;
                    if (data.type === 'text') stats.text++;
                });

                // Update Stats
                document.getElementById('stat-total').innerText = stats.total;
                document.getElementById('stat-likes').innerText = stats.like;
                document.getElementById('stat-dislikes').innerText = stats.dislike;
                document.getElementById('stat-text').innerText = stats.text;

                renderList();

            } catch (e) {
                container.innerHTML = `<div class="text-red-500 text-center">Error: ${e.message}</div>`;
                console.error(e);
            }
        };

        window.deleteItem = async (id) => {
            if (!confirm('Ви впевнені, що хочете видалити цей відгук?')) return;

            try {
                // Пряма взаємодія з Firestore (дозволено новими правилами для авторизованих)
                await deleteDoc(doc(db, "web_feedback", id));
                
                // Видаляємо з локального масиву та перемальовуємо
                allItems = allItems.filter(item => item.id !== id);
                renderList();
                
                // Оновлюємо лічильники (спрощений варіант — просто перезавантажуємо)
                loadFeedback();
            } catch (e) {
                alert('Помилка видалення: ' + e.message);
            }
        };

        function renderList() {
            const container = document.getElementById('feedback-container');
            container.innerHTML = '';

            const filtered = currentFilter === 'all'
                ? allItems
                : allItems.filter(item => item.type === currentFilter);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-slate-600">Нічого не знайдено 🍃</div>';
                return;
            }

            filtered.forEach(item => {
                const date = item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleString('uk-UA') : 'No Date';
                const email = item.email || 'Anonymous';
                const source = item.source || 'unknown';

                let sourceBadge = '';
                if (source === 'free_report') sourceBadge = '<span class="px-1.5 py-0.5 rounded text-[10px] font-bold bg-slate-600 text-white ml-2">FREE REPORT</span>';
                if (source === 'premium_report') sourceBadge = '<span class="px-1.5 py-0.5 rounded text-[10px] font-bold bg-amber-500 text-black ml-2">PREMIUM REPORT</span>';

                let icon = '❓';
                let borderClass = 'border-slate-700';
                let bgClass = 'bg-slate-800/50';

                if (item.type === 'like') { icon = '👍'; borderClass = 'border-green-500/30'; bgClass = 'bg-green-900/10'; }
                if (item.type === 'dislike') { icon = '👎'; borderClass = 'border-red-500/30'; bgClass = 'bg-red-900/10'; }
                if (item.type === 'text') { icon = '💬'; borderClass = 'border-indigo-500/50'; bgClass = 'bg-indigo-900/10'; }

                const contentHtml = item.type === 'text'
                    ? `<div class="mt-2 text-white bg-slate-900/50 p-3 rounded border border-slate-700 text-sm whitespace-pre-wrap">${escapeHtml(item.value)}</div>`
                    : `<div class="text-slate-500 text-sm italic mt-1">Оцінка: ${item.value}</div>`;

                const card = document.createElement('div');
                card.className = `card rounded-lg p-4 border ${borderClass} ${bgClass} transition hover:bg-slate-800 relative group`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">${icon}</span>
                            <div>
                                <div class="font-bold text-slate-200 text-sm flex items-center">
                                    ${email} ${sourceBadge}
                                </div>
                                <div class="text-xs text-slate-500">${date}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                             <span class="text-xs px-2 py-1 bg-slate-900 rounded text-slate-400 capitalize">${item.type}</span>
                             <button onclick="deleteItem('${item.id}')" 
                                class="opacity-0 group-hover:opacity-100 p-1.5 hover:bg-red-500/20 text-slate-500 hover:text-red-500 rounded-lg transition"
                                title="Видалити">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                             </button>
                        </div>
                    </div>
                    ${contentHtml}
                `;
                container.appendChild(card);
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 🔥 AUTO-LOGIN CHECK
        onAuthStateChanged(auth, (user) => {
            if (user && sessionStorage.getItem(SESSION_KEY) === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadFeedback();
            }
        });
    </script>
</body>

</html>
