<!doctype html>
<html lang="uk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🤖 Bot Logs | Destiny Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
        }

        /* Custom scrollbar for log messages */
        .log-msg::-webkit-scrollbar {
            width: 6px;
        }

        .log-msg::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .log-msg::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8">

    <!-- 🔐 LOGIN SCREEN (Reusing same logic) -->
    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
        <div class="card rounded-2xl p-8 w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold text-white mb-2">🔐 Bot Admin</h2>
            <input type="password" id="password-input" placeholder="Password"
                class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-600 text-white text-center text-lg tracking-widest mb-4 focus:outline-none focus:border-indigo-500"
                autofocus />
            <button id="login-btn"
                class="w-full px-4 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-semibold transition">
                Увійти
            </button>
        </div>
    </div>

    <!-- 📊 DASHBOARD -->
    <div id="admin-content" class="max-w-6xl mx-auto hidden pb-20">
        <div class="flex items-center justify-between mb-8">
            <div>
                <a href="/admin" class="text-indigo-400 hover:text-indigo-300 text-sm mb-1 inline-block">← Назад до
                    Варіантів</a>
                <h1 class="text-3xl font-bold text-white">🤖 Telegram Bot Logs</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="switchView('logs')" id="btn-view-logs"
                    class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm text-white">📝 Logs</button>
                <button onclick="switchView('summaries')" id="btn-view-summaries"
                    class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm text-slate-300">📊
                    Summaries</button>
                <button onclick="refreshData()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">🔄
                    Refresh</button>
            </div>
        </div>

        <!-- VIEW: SUMMARIES -->
        <div id="view-summaries" class="hidden">
            <div id="summaries-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Cards will go here -->
            </div>
        </div>

        <!-- VIEW: LOGS (Archived Sessions) -->
        <div id="view-logs">

            <div class="mb-6 text-slate-400 text-sm">
                ℹ️ Тут відображаються <b>завершені діалоги</b> (архівуються через 4-5 хв після останнього повідомлення).
            </div>

            <div id="error-container"
                class="hidden mb-4 p-4 bg-red-900/50 border border-red-500/50 rounded-xl text-red-200 text-sm"></div>

            <!-- LOGS CONTAINER -->
            <div id="logs-container" class="grid gap-4">
                <div class="text-center py-20 text-slate-500 animate-pulse">Завантаження архівів...</div>
            </div>
        </div>

        <!-- FIREBASE SDK -->
        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
            import { getFirestore, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

            const firebaseConfig = {
                projectId: "destinycode-982fa",
                appId: "1:168629222416:web:3283f6a4051f57a85c9e95", // Replace if needed from original
                storageBucket: "destinycode-982fa.firebasestorage.app",
                apiKey: "AIzaSyA20BvSogSuHTni09Y54HwmlpG7UKXuxk8",
                authDomain: "destinycode-982fa.firebaseapp.com",
                messagingSenderId: "168629222416",
                measurementId: "G-ZKS4RCNFGX"
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app, 'destiny-code-db'); // 🔥 Bot data lives here

            // AUTH
            // AUTH
            // SECURE PROXY FETCHING

            // CONFIG
            const API_BASE_URL = 'https://europe-west1-destinycode-982fa.cloudfunctions.net'; // Production URL
            // const API_BASE_URL = 'http://127.0.0.1:5001/destinycode-982fa/europe-west1'; // Local Dev URL (Uncomment for testing)

            const ADMIN_PASSWORD = '1536';
            const SESSION_KEY = 'dc_admin_auth';

            // AUTH UI
            const loginScreen = document.getElementById('login-screen');
            const adminContent = document.getElementById('admin-content');
            const passwordInput = document.getElementById('password-input');

            document.getElementById('login-btn').addEventListener('click', attemptLogin);
            passwordInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') attemptLogin();
            });

            function attemptLogin() {
                const pass = passwordInput.value;
                if (pass === ADMIN_PASSWORD) {
                    sessionStorage.setItem(SESSION_KEY, 'true');
                    showAdminContent();
                } else {
                    alert('Wrong password');
                    passwordInput.value = '';
                }
            }

            function showAdminContent() {
                loginScreen.classList.add('hidden');
                adminContent.classList.remove('hidden');
                loadLogs();
            }

            // AUTO LOGIN CHECK
            if (sessionStorage.getItem(SESSION_KEY) === 'true') {
                showAdminContent();
            }

            // NAVIGATION
            window.switchView = (view) => {
                // Currently only one consolidated view 'logs' is supported
                loadLogs();
            };

            window.refreshData = () => {
                loadLogs();
            }

            // --- FETCH DATA VIA PROXY ---
            async function loadLogs() {
                const container = document.getElementById('logs-container');
                const errorContainer = document.getElementById('error-container');

                container.innerHTML = '<div class="text-center py-20 text-slate-500 animate-pulse">Завантаження даних...</div>';
                errorContainer.classList.add('hidden');
                errorContainer.innerHTML = '';

                try {
                    const response = await fetch(`${API_BASE_URL}/getBotLogs?type=summaries`, {
                        method: 'GET',
                        headers: {
                            'x-admin-key': ADMIN_PASSWORD
                        }
                    });

                    if (!response.ok) {
                        throw new Error(`Server Error: ${response.status} ${response.statusText}`);
                    }

                    const json = await response.json();
                    const allItems = json.logs || [];

                    // Sort by newest first (Server already sorts but just in case)
                    allItems.sort((a, b) => b.timestamp - a.timestamp);

                    if (allItems.length === 0) {
                        container.innerHTML = '<div class="text-center py-20 text-slate-600">Архів пустий 🍃</div>';
                        return;
                    }

                    container.innerHTML = '';

                    allItems.forEach(data => {
                        const date = data.timestamp ? new Date(data.timestamp).toLocaleString('uk-UA') : 'Unknown Date';
                        const history = data.history || [];
                        const summary = escapeHtml(data.summary || '');
                        const username = (data.username && data.username !== 'unknown') ? data.username : ('User ' + (data.userId || '???'));

                        // Card
                        const card = document.createElement('div');
                        card.className = `card rounded-xl p-5 border border-slate-700 bg-slate-800/50 hover:bg-slate-800 transition cursor-pointer mb-4`;

                        if (history.length > 0) {
                            card.onclick = (e) => toggleHistory(card, e);
                        }

                        // Badge
                        const typeBadge = `<span class="bg-indigo-600 text-white text-[10px] px-2 py-0.5 rounded-full">Archive</span>`;

                        // Header
                        let html = `
                            <div class="flex justify-between items-start mb-3 pointer-events-none">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <div class="font-bold text-indigo-400 text-lg">@${username}</div>
                                        ${typeBadge}
                                    </div>
                                    <div class="text-xs text-slate-500">ID: ${data.userId} • Msgs: ${data.messagesCount || history.length}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs text-slate-400">${date}</div>
                                    <div class="text-xs text-slate-600 mt-1">${timeAgo(data.timestamp)}</div>
                                </div>
                            </div>
                        `;

                        // Summary Section
                        if (summary && summary !== 'No summary generated') {
                            html += `
                                <div class="mb-3 p-3 bg-indigo-900/10 rounded-lg border border-indigo-500/20 text-sm text-indigo-200/90 leading-relaxed pointer-events-none">
                                    ${summary}
                                </div>
                            `;
                        } else {
                            html += `<div class="text-xs text-slate-600 italic mb-2">Підсумок відсутній.</div>`;
                        }

                        // History Section
                        if (history.length > 0) {
                            html += `
                                <div class="history-content hidden mt-4 border-t border-slate-700 pt-4 space-y-3">
                            `;

                            history.forEach(msg => {
                                const isUser = msg.role === 'user';
                                const align = isUser ? 'text-right' : 'text-left';
                                const bg = isUser ? 'bg-indigo-600 text-white ml-auto' : 'bg-slate-700 text-slate-200 mr-auto';
                                const label = isUser ? '👤 Ви:' : '🤖 Анна:';

                                html += `
                                    <div class="${align}">
                                        <div class="text-xs text-slate-500 mb-1">${label}</div>
                                        <div class="inline-block max-w-[85%] px-4 py-2 rounded-2xl ${bg} text-sm whitespace-pre-wrap text-left">${escapeHtml(msg.text)}</div>
                                    </div>
                                `;
                            });

                            html += `</div>
                                <div class="text-center mt-3 text-xs text-slate-500 pointer-events-none expand-hint">🔽 Розгорнути переписку</div>
            `;
                        }

                        card.innerHTML = html;
                        container.appendChild(card);
                    });

                } catch (e) {
                    console.error(e);
                    errorContainer.innerHTML = `⚠️ <b>Connection Error:</b><br>${e.message}`;
                    errorContainer.classList.remove('hidden');
                    container.innerHTML = '';
                }
            }

            function timeAgo(ms) {
                if (!ms) return '';
                const sec = Math.floor((Date.now() - ms) / 1000);
                if (sec < 60) return 'щойно';
                if (sec < 3600) return Math.floor(sec / 60) + ' хв тому';
                if (sec < 86400) return Math.floor(sec / 3600) + ' год тому';
                return Math.floor(sec / 86400) + ' дн тому';
            }

            function toggleHistory(card, e) {
                const content = card.querySelector('.history-content');
                if (!content) return;
                const hint = card.querySelector('.expand-hint');

                if (content.classList.contains('hidden')) {
                    content.classList.remove('hidden');
                    hint.textContent = '🔼 Згорнути';
                    card.classList.add('ring-1', 'ring-indigo-500');
                } else {
                    content.classList.add('hidden');
                    hint.textContent = '🔽 Розгорнути переписку';
                    card.classList.remove('ring-1', 'ring-indigo-500');
                }
            }

            function escapeHtml(text) {
                if (!text) return '';
                return text
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }
        </script>
</body>

</html>
